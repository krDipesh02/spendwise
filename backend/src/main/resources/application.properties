spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spendwise}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/api/v1}

spendwise.auth.google-success-redirect-url=${GOOGLE_SUCCESS_REDIRECT_URL:http://localhost:5173/app/dashboard}
spendwise.auth.backend-base-url=${BACKEND_BASE_URL:http://localhost:8080}
spendwise.auth.automation-service-token=${AUTOMATION_SERVICE_TOKEN:changeme-service-token}
spendwise.auth.conversation-memory-ttl-seconds=${CONVERSATION_MEMORY_TTL_SECONDS:86400}
spendwise.auth.conversation-memory-max-messages=${CONVERSATION_MEMORY_MAX_MESSAGES:20}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
server.forward-headers-strategy=framework

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
