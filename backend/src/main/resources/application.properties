spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spendwise}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

spendwise.auth.google-success-redirect-url=${GOOGLE_SUCCESS_REDIRECT_URL:http://localhost:5173/app/dashboard}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-me}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-me}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/login/oauth2/code/google}
server.forward-headers-strategy=framework
