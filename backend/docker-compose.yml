services:
  postgres:
    image: postgres:16-alpine
    container_name: spendwise-postgres
    environment:
      POSTGRES_DB: spendwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spendwise"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spendwise-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/spendwise
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      GOOGLE_CLIENT_ID: <>
      GOOGLE_CLIENT_SECRET: <>
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/v1/login/oauth2/code/google
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "5005:5005"

volumes:
  postgres-data:
